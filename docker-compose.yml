services:
  backend:
    build:
      context: ./backend
    container_name: tours-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: "*"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: tours-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
